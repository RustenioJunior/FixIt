name: Build and deploy FixIt.API

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x' # versão do .NET
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build
    - name: Create /app directory
      run: mkdir /app
    - name: Publish
      run: dotnet publish FixIt.API/FixIt.API.csproj -c Release -o /app
    - name: Copy apphost
      run: cp /home/runner/work/FixIt/FixIt/FixIt.API/obj/Release/net8.0/apphost /app
    - name: Set permissions
      run: chmod 777 /app /app/*
    - name: Deploy to Docker Hub # ou outro serviço
      uses: docker/build-push-action@v3
      with:
        context: .
        file: ./Dockerfile
        push: true
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}
        tags: ${{ secrets.DOCKER_HUB_USERNAME }}/dotnet/sdk:8.0

